<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 800;
      font-size: 42px;
      fill: #DFE3E2;
      letter-spacing: 2px;
    }
    .subtitle {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 500;
      font-size: 14px;
      fill: #007C7C;
      letter-spacing: 3px;
    }
    .pulse-line {
      stroke: url(#paint0_linear_pulse);
      stroke-width: 2px;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .glow {
      filter: drop-shadow(0px 0px 8px #007C7C);
    }
  </style>
  
  <rect width="800" height="200" rx="12" fill="#020A0B"/>
  
  <!-- Subtle decorative background circuit elements -->
  <path d="M 50,50 L 150,50 L 180,80" stroke="#005D5D" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>
  <circle cx="180" cy="80" r="3" fill="#005D5D" opacity="0.3"/>
  
  <path d="M 750,150 L 650,150 L 620,120" stroke="#005D5D" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>
  <circle cx="620" cy="120" r="3" fill="#005D5D" opacity="0.3"/>

  <!-- Centered Name and Subtitle -->
  <text x="50%" y="90" text-anchor="middle" class="title">DANISH JAMADAR</text>
  <text x="50%" y="130" text-anchor="middle" class="subtitle">AI/ML • Computer Vision • IoT • Applied AI Systems</text>
  
  <!-- Pulse Line at the bottom -->
  <path d="M 100,165 L 320,165 L 335,150 L 350,180 L 365,165 L 380,165 L 390,145 L 400,185 L 410,165 L 700,165" class="pulse-line glow"/>

  <defs>
    <linearGradient id="paint0_linear_pulse" x1="100" y1="165" x2="700" y2="165" gradientUnits="userSpaceOnUse">
      <stop stop-color="#007C7C" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#007C7C" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#007C7C"/>
      <stop offset="0.7" stop-color="#007C7C" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#007C7C" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
